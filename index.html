<style>
  :root{
    --bg:#0a0b0f; --panel:#14161d; --panel2:#191c25; --ink:#f3f4f7; --soft:#969cab; --line:#262a35;
    --cta-ink:#06080c; --glow-op:.5; --thumb1:#1b1e27; --thumb2:#0e1015; --scrim:rgba(4,5,8,.62);
    --accent:#38bdf8; --accent-rgb:56,189,248; --radius:22px;
    --font:"Aptos","Segoe UI Variable Text","Segoe UI",system-ui,-apple-system,"Inter",Roboto,Helvetica,Arial,sans-serif;
    --display:"Aptos Display","Aptos","Segoe UI Variable Display","Segoe UI",system-ui,-apple-system,"Inter",sans-serif;
  }
  [data-theme="light"]{
    --bg:#f4f3ef; --panel:#ffffff; --panel2:#faf7f2; --ink:#16140f; --soft:#6b6357; --line:#e7e2d8;
    --cta-ink:#ffffff; --glow-op:.26; --thumb1:#ffffff; --thumb2:#ece9e2; --scrim:rgba(20,16,10,.42);
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;font-family:var(--font);color:var(--ink);background:var(--bg);
    -webkit-font-smoothing:antialiased;transition:background-color .4s ease,color .4s ease}
  a{color:inherit;text-decoration:none}
  button{font-family:inherit;color:inherit}

  .bgglow{position:fixed;top:-24%;left:50%;width:130vw;height:60vh;transform:translateX(-50%);
    background:var(--accent);filter:blur(130px);opacity:var(--glow-op);z-index:0;
    transition:background-color .6s ease,opacity .6s ease;pointer-events:none}

  .app{position:relative;z-index:1;height:100dvh;display:flex;flex-direction:column;overflow:hidden}

  /* top bar */
  .top{display:flex;align-items:center;gap:12px;padding:12px 16px}
  .icon-btn{width:42px;height:42px;border-radius:12px;border:1px solid var(--line);background:var(--panel);
    display:grid;place-items:center;cursor:pointer;transition:.15s;flex:0 0 auto}
  .icon-btn:hover{border-color:var(--accent);color:var(--accent)}
  .icon-btn svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .brand{font-family:var(--display);font-weight:800;font-size:20px;letter-spacing:-.02em;margin:0 auto}
  .brand b{color:var(--accent);transition:color .5s}
  /* theme toggle icons */
  [data-theme="dark"] .i-moon{display:none}
  [data-theme="light"] .i-sun{display:none}
  .i-moon{fill:currentColor;stroke:none}

  /* category bar */
  .cats{display:flex;gap:8px;padding:2px 14px 8px;overflow-x:auto;scrollbar-width:none}
  .cats::-webkit-scrollbar{display:none}
  .cat{flex:0 0 auto;border:1px solid var(--line);background:var(--panel);color:var(--soft);
    padding:9px 14px;border-radius:999px;font-weight:700;font-size:13.5px;cursor:pointer;white-space:nowrap;transition:.18s}
  .cat:hover{color:var(--ink)}
  .cat.active{background:var(--ink);color:var(--bg);border-color:var(--ink)}

  /* product bar */
  .prods{display:flex;gap:10px;padding:4px 14px 10px;overflow-x:auto;scrollbar-width:none}
  .prods::-webkit-scrollbar{display:none}
  .pchip{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;gap:5px;width:70px;
    background:transparent;border:0;cursor:pointer;padding:4px 2px}
  .pchip .thumb{width:54px;height:54px;border-radius:15px;display:grid;place-items:center;font-size:26px;
    background:linear-gradient(150deg,var(--thumb1),var(--thumb2));border:1px solid var(--line);overflow:hidden;transition:.22s}
  .pchip .thumb img{width:100%;height:100%;object-fit:cover}
  .pchip .pl{font-size:10.5px;color:var(--soft);font-weight:600;white-space:nowrap;max-width:70px;overflow:hidden;text-overflow:ellipsis}
  .pchip.active .thumb{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent),0 0 22px -3px var(--accent);transform:translateY(-2px)}
  .pchip.active .pl{color:var(--ink)}

  /* stage */
  .stage{flex:1;min-height:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:10px;padding:4px 22px 6px;text-align:center;
    transition:opacity .26s cubic-bezier(.4,0,.2,1),transform .26s cubic-bezier(.4,0,.2,1)}
  .stage.out{opacity:0;transform:translateY(10px) scale(.985)}
  .mediawrap{position:relative;display:grid;place-items:center;width:min(80vw,330px);height:32dvh;max-height:340px}
  .glow{position:absolute;width:78%;height:78%;border-radius:50%;background:var(--accent);filter:blur(54px);
    opacity:var(--glow-op);z-index:0;transition:background-color .6s ease}
  .media{position:relative;z-index:1;width:100%;height:100%;background:var(--panel);border:1px solid var(--line);
    border-radius:var(--radius);display:grid;place-items:center;overflow:hidden;box-shadow:0 26px 56px rgba(0,0,0,.35)}
  .media img{width:100%;height:100%;object-fit:contain;padding:10px}
  .media .ph{font-size:104px;line-height:1}
  .meta{display:flex;gap:9px;align-items:center;justify-content:center;font-size:11px;letter-spacing:.14em;color:var(--soft);font-weight:700}
  .badge{background:rgba(var(--accent-rgb),.16);color:var(--accent);padding:4px 10px;border-radius:999px;letter-spacing:.03em;transition:.5s}
  .bestfor{font-size:11.5px;font-weight:800;letter-spacing:.05em;color:var(--accent);text-transform:uppercase;transition:color .5s}
  .name{font-family:var(--display);font-weight:800;font-size:clamp(24px,5.6vw,38px);letter-spacing:-.02em;line-height:1.05;margin:0}
  .desc{color:var(--soft);font-size:clamp(13.5px,3.4vw,15.5px);max-width:500px;margin:0 auto;line-height:1.5}
  .price{font-weight:800;font-size:17px;color:var(--accent);transition:color .5s}
  .price small{font-weight:600;color:var(--soft);font-size:12px}
  .cta{display:inline-flex;align-items:center;gap:.4em;background:var(--accent);color:var(--cta-ink);font-weight:800;
    font-size:15.5px;padding:13px 28px;border-radius:999px;transition:background-color .5s,transform .12s;
    box-shadow:0 12px 28px -8px var(--accent);margin-top:2px}
  .cta:hover{transform:translateY(-2px)}
  .arrows{display:flex;gap:14px;align-items:center;justify-content:center;padding:4px 0 2px}
  .nav{width:40px;height:40px;border-radius:50%;border:1px solid var(--line);background:var(--panel);
    font-size:19px;cursor:pointer;display:grid;place-items:center;transition:.15s}
  .nav:hover{border-color:var(--accent);color:var(--accent)}

  /* footer */
  .foot{display:flex;align-items:center;gap:9px;padding:9px 16px;border-top:1px solid var(--line);
    font-size:12px;color:var(--soft);overflow-x:auto;white-space:nowrap;scrollbar-width:none}
  .foot::-webkit-scrollbar{display:none}
  .foot .link{color:var(--soft);background:none;border:0;cursor:pointer;font:inherit;padding:3px 0}
  .foot .link:hover{color:var(--ink)}
  .foot .sep{opacity:.35}

  /* drawer */
  .scrim{position:fixed;inset:0;background:var(--scrim);z-index:60;opacity:0;visibility:hidden;transition:.25s;backdrop-filter:blur(3px)}
  .scrim.open{opacity:1;visibility:visible}
  .drawer{position:fixed;top:0;left:0;height:100dvh;width:min(86vw,340px);background:var(--panel);
    border-right:1px solid var(--line);z-index:61;transform:translateX(-104%);transition:transform .28s cubic-bezier(.4,0,.2,1);
    display:flex;flex-direction:column;overflow-y:auto}
  .drawer.open{transform:none}
  .dhead{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--panel)}
  .dhead .brand{margin:0;font-size:18px}
  .dsec{padding:14px 18px;border-bottom:1px solid var(--line)}
  .dsec h4{margin:0 0 10px;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--soft)}
  .dcat{font-weight:800;font-size:14px;margin:12px 0 6px;color:var(--ink)}
  .dcat:first-child{margin-top:0}
  .ditem{display:flex;align-items:center;gap:9px;width:100%;background:none;border:0;cursor:pointer;
    padding:8px 8px;border-radius:10px;text-align:left;font-size:14px;color:var(--ink)}
  .ditem:hover{background:var(--panel2)}
  .ditem .e{font-size:17px}
  .dlink{display:block;width:100%;text-align:left;background:none;border:0;cursor:pointer;padding:9px 8px;border-radius:10px;font-size:14px;color:var(--ink)}
  .dlink:hover{background:var(--panel2)}
  .dcontact{display:block;padding:7px 8px;font-size:14px}
  .dcontact span{color:var(--soft);font-size:12px;display:block}
  .dnote{padding:14px 18px;font-size:11.5px;color:var(--soft);line-height:1.5}

  /* modal */
  .overlay{position:fixed;inset:0;z-index:100;display:none;align-items:center;justify-content:center;padding:18px;background:var(--scrim);backdrop-filter:blur(6px)}
  .overlay.open{display:flex}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:20px;max-width:560px;width:100%;max-height:84dvh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 30px 80px rgba(0,0,0,.5)}
  .panel-head{display:flex;align-items:center;justify-content:space-between;padding:18px 20px;border-bottom:1px solid var(--line)}
  .panel-head h2{font-family:var(--display);font-size:20px;margin:0}
  .panel-body{padding:18px 20px;overflow-y:auto}
  .x{background:transparent;border:0;color:var(--soft);font-size:26px;line-height:1;cursor:pointer}
  .trustrow{display:flex;gap:12px;align-items:flex-start;margin:0 0 16px}
  .trustrow .e{font-size:24px}
  .trustrow h4{margin:0 0 3px;font-size:15px}
  .trustrow p{margin:0;font-size:14px;color:var(--soft)}
  .panel-body details{border:1px solid var(--line);border-radius:12px;margin-bottom:10px;background:var(--panel2);overflow:hidden}
  .panel-body summary{list-style:none;cursor:pointer;padding:14px 16px;font-weight:700;font-size:15px;display:flex;justify-content:space-between;gap:10px}
  .panel-body summary::-webkit-details-marker{display:none}
  .panel-body summary::after{content:"+";color:var(--accent);font-weight:800}
  .panel-body details[open] summary::after{content:"–"}
  .panel-body details .a{padding:0 16px 14px;color:var(--soft);font-size:14px;line-height:1.6}
  .panel-body p{font-size:14px;color:var(--soft);line-height:1.6}
  .note{font-size:12px;color:var(--soft);opacity:.85;margin-top:4px}

  @media (prefers-reduced-motion: reduce){*{transition:none!important}}
</style>
</head>
<body>
  <div class="bgglow"></div>

  <div class="app">
    <header class="top">
      <button class="icon-btn" id="menuBtn" aria-label="Open menu">
        <svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="brand" id="brand">vinral</div>
      <button class="icon-btn" id="themeBtn" aria-label="Switch light / dark">
        <svg class="i-sun" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4.2"/><line x1="12" y1="2.5" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="21.5"/><line x1="2.5" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="21.5" y2="12"/><line x1="5.2" y1="5.2" x2="6.9" y2="6.9"/><line x1="17.1" y1="17.1" x2="18.8" y2="18.8"/><line x1="5.2" y1="18.8" x2="6.9" y2="17.1"/><line x1="17.1" y1="6.9" x2="18.8" y2="5.2"/></svg>
        <svg class="i-moon" viewBox="0 0 24 24"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
      </button>

    <nav class="cats" id="cats" aria-label="Categories"></nav>

    <main class="stage" id="stage">
      <div class="mediawrap"><div class="glow"></div><div class="media" id="media"></div></div>

      <button class="link" data-modal="legal">Legal</button>
      <span class="sep">·</span>
      <button class="link" data-modal="contact">Contact</button>
    </footer>
  </div>

  <!-- drawer -->
  <div class="scrim" id="scrim"></div>
  <aside class="drawer" id="drawer" aria-label="Menu">
    <div class="dhead"><div class="brand" id="drawerBrand">vinral</div><button class="icon-btn" id="menuClose" aria-label="Close menu" style="width:36px;height:36px"><svg viewBox="0 0 24 24"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg></button></div>

    <div class="dnote" id="drawerNote"></div>
  </aside>

  <!-- modal -->
  <div class="overlay" id="overlay" aria-hidden="true">
    <div class="panel" role="dialog" aria-modal="true" aria-labelledby="mTitle">
      <div class="panel-head"><h2 id="mTitle"></h2><button class="x" id="mClose" aria-label="Close">×</button></div>
      <div class="panel-body" id="mBody"></div>
    </div>
  </div>

<script src="products.js"></script>
<script>
(function(){
  var S=window.SITE||{}, ALL=(window.PRODUCTS||[]).filter(function(p){return p.status!=="paused";})
        .sort(function(a,b){return (b.priority||0)-(a.priority||0);});
  var stageEl=document.getElementById("stage");
  if(!ALL.length){stageEl.innerHTML="<p style='color:var(--ink)'>products.js not found — keep it in the same folder as index.html.</p>";return;}

  function esc(s){return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
  function pad(x){return (x<10?"0":"")+x;}
  function ga(name,params){ if(window.gtag){ try{ gtag("event",name,params||{}); }catch(e){} } }

  // brand
  if(S.metaTitle)document.title=S.metaTitle;
  function setBrand(el){ if(!el)return; if(S.brandName){var nm=S.brandName.split(" "),last=nm.pop();
    el.innerHTML=esc(nm.join(" "))+(nm.length?" ":"")+"<b>"+esc(last)+"</b>";}}
  setBrand(document.getElementById("brand")); setBrand(document.getElementById("drawerBrand"));

  var SHORT={"misting-fan":"Misting fan","car-shade":"Car shade","neck-fan":"Neck fan","cooling-towel":"Cooling towel",
    "sunset-lamp":"Sunset lamp","perfume-set":"Perfume set","hair-trio":"Hair trio","phone-case":"Phone case",
    "led-face-mask":"LED mask","mini-projector":"Mini projector","cordless-vacuum":"Car vacuum","mini-printer":"Pocket printer",
    "galaxy-projector":"Galaxy","led-wall-lights":"Wall lights","car-starlight":"Starlight","posture-corrector":"Posture",
    "pet-deshedding":"Pet brush"};
  var COLORS={"led-face-mask":"#fb7185","perfume-set":"#c084fc","hair-trio":"#f59e0b","posture-corrector":"#34d399",
    "misting-fan":"#38bdf8","neck-fan":"#22d3ee","cooling-towel":"#2dd4bf","galaxy-projector":"#a855f7",
    "sunset-lamp":"#fb923c","led-wall-lights":"#c084fc","mini-projector":"#818cf8","mini-printer":"#06b6d4",
    "phone-case":"#60a5fa","cordless-vacuum":"#34d399","pet-deshedding":"#f59e0b","car-shade":"#fb923c","car-starlight":"#60a5fa"};
  var FALLBACK=["#38bdf8","#fb923c","#22d3ee","#34d399","#fb7185","#c084fc","#f59e0b","#60a5fa"];
  function accent(p,i){return COLORS[p.id]||FALLBACK[i%FALLBACK.length];}
  function hexRgb(h){h=h.replace("#","");if(h.length===3)h=h.split("").map(function(c){return c+c;}).join("");
    var v=parseInt(h,16);return (v>>16&255)+","+(v>>8&255)+","+(v&255);}

  // categories that actually contain products, in SITE order
  var cats=(S.categories||[]).filter(function(c){return ALL.some(function(p){return p.category===c.id;});});
  function prodsIn(catId){return ALL.filter(function(p){return p.category===catId;});}
  function shortName(p){return SHORT[p.id]||p.productName;}

  var cur=ALL[0], busy=false;

  // refs
  var catbar=document.getElementById("cats"), prodbar=document.getElementById("prods"),
      media=document.getElementById("media"), counter=document.getElementById("counter"),
      badge=document.getElementById("badge"), bestfor=document.getElementById("bestfor"),
      name=document.getElementById("name"), desc=document.getElementById("desc"),
      price=document.getElementById("price"), cta=document.getElementById("cta"), root=document.documentElement;

  function mediaHTML(p){return p.image?'<img src="'+esc(p.image)+'" alt="'+esc(p.productName)+'">':'<div class="ph">'+esc(p.emoji||"🛍️")+'</div>';}

  function renderCats(){
    catbar.innerHTML=cats.map(function(c){
      return '<button class="cat'+(c.id===cur.category?" active":"")+'" data-cat="'+esc(c.id)+'">'+esc(c.label)+'</button>';}).join("");
  }
  function renderProds(){
    var list=prodsIn(cur.category);
    prodbar.innerHTML=list.map(function(p){
      var thumb=p.image?'<img src="'+esc(p.image)+'" alt="">':esc(p.emoji||"🛍️");
      return '<button class="pchip'+(p.id===cur.id?" active":"")+'" data-prod="'+esc(p.id)+'">'+
        '<span class="thumb">'+thumb+'</span><span class="pl">'+esc(shortName(p))+'</span></button>';}).join("");
    var act=prodbar.querySelector(".pchip.active"); if(act&&act.scrollIntoView)act.scrollIntoView({inline:"center",block:"nearest",behavior:"smooth"});
  }
  function renderStage(){
    var list=prodsIn(cur.category), idx=list.indexOf(cur), col=accent(cur, ALL.indexOf(cur));
    root.style.setProperty("--accent",col); root.style.setProperty("--accent-rgb",hexRgb(col));
    media.innerHTML=mediaHTML(cur);
    counter.textContent=pad(idx+1)+" / "+pad(list.length);
    badge.textContent=cur.badge||""; badge.style.display=cur.badge?"":"none";
    bestfor.textContent=cur.bestFor?("Best for · "+cur.bestFor):"";
    name.textContent=cur.productName||"";
    desc.textContent=cur.mainBenefit||cur.shortHook||"";
    price.innerHTML=(cur.price?esc(cur.price):"")+' <small>· check live price</small>';
    cta.textContent=cur.cta||"View product →"; cta.setAttribute("href",cur.link||"#"); cta.setAttribute("data-pid",cur.id);
  }
  function preload(p){if(p&&p.image){var im=new Image();im.src=p.image;}}

  function go(prod){
    if(!prod||busy||prod.id===cur.id)return;
    var catChanged=prod.category!==cur.category;
    busy=true; stageEl.classList.add("out");
    setTimeout(function(){
      cur=prod;
      if(catChanged){renderCats();renderProds();} else {
        [].forEach.call(prodbar.children,function(b){b.classList.toggle("active",b.dataset.prod===cur.id);});
      }
      renderStage();
      requestAnimationFrame(function(){stageEl.classList.remove("out");});
      busy=false;
      ga("select_item",{item_id:cur.id,item_name:cur.productName,item_category:cur.category});
      var l=prodsIn(cur.category), k=l.indexOf(cur); preload(l[k+1]); preload(l[k-1]);
    },230);
  }
  function selectCat(catId){var l=prodsIn(catId); if(l.length)go(l[0]);}
  function step(d){var l=prodsIn(cur.category),k=l.indexOf(cur);go(l[(k+d+l.length)%l.length]);}

  // events
  catbar.addEventListener("click",function(e){var b=e.target.closest("[data-cat]");if(b)selectCat(b.dataset.cat);});
  prodbar.addEventListener("click",function(e){var b=e.target.closest("[data-prod]");if(b)go(ALL.filter(function(p){return p.id===b.dataset.prod;})[0]);});
  document.getElementById("prev").addEventListener("click",function(){step(-1);});
  document.getElementById("next").addEventListener("click",function(){step(1);});
  cta.addEventListener("click",function(){ga("outbound_click",{item_id:cur.id,item_name:cur.productName,link:cur.link});});

  /* ---------- theme toggle ---------- */
  var tc=document.getElementById("themeColor");
  function setTheme(t){root.setAttribute("data-theme",t);try{localStorage.setItem("theme",t);}catch(e){}
    if(tc)tc.content=(t==="light"?"#f4f3ef":"#0a0b0f");}
  document.getElementById("themeBtn").addEventListener("click",function(){
    setTheme(root.getAttribute("data-theme")==="light"?"dark":"light");});

  /* ---------- drawer ---------- */
  var scrim=document.getElementById("scrim"),drawer=document.getElementById("drawer");
  function openDrawer(){scrim.classList.add("open");drawer.classList.add("open");}
  function closeDrawer(){scrim.classList.remove("open");drawer.classList.remove("open");}
  document.getElementById("menuBtn").addEventListener("click",openDrawer);
  document.getElementById("menuClose").addEventListener("click",closeDrawer);
  scrim.addEventListener("click",closeDrawer);

  // drawer browse: categories then their products
  document.getElementById("drawerBrowse").innerHTML=cats.map(function(c){
    var items=prodsIn(c.id).map(function(p){
      return '<button class="ditem" data-prod="'+esc(p.id)+'"><span class="e">'+esc(p.emoji||"🛍️")+'</span>'+esc(p.productName)+'</button>';}).join("");
    return '<div class="dcat" data-cat="'+esc(c.id)+'" style="cursor:pointer">'+esc(c.label)+'</div>'+items;}).join("");
  document.getElementById("drawerBrowse").addEventListener("click",function(e){
    var p=e.target.closest("[data-prod]"); var c=e.target.closest("[data-cat]");
    if(p){go(ALL.filter(function(x){return x.id===p.dataset.prod;})[0]);closeDrawer();}
    else if(c){selectCat(c.dataset.cat);closeDrawer();}
  });
  // drawer contacts
  var contacts=S.contacts||[{label:"Email",value:(S.footer&&S.footer.contactEmail)||"hello@yourdomain.com",href:"mailto:"+((S.footer&&S.footer.contactEmail)||"hello@yourdomain.com")}];
  document.getElementById("drawerContacts").innerHTML=contacts.map(function(c){
    return '<a class="dcontact" href="'+esc(c.href||"#")+'"'+((c.href||"").indexOf("http")===0?' target="_blank" rel="noopener"':"")+'>'+esc(c.value||c.label)+'<span>'+esc(c.label)+'</span></a>';}).join("");
  document.getElementById("drawerNote").textContent=S.affiliateDisclosure||"";
  // drawer help / modal buttons
  drawer.addEventListener("click",function(e){var b=e.target.closest("[data-modal]");if(b){closeDrawer();openModal(b.dataset.modal);}});

  /* ---------- modals ---------- */
  var overlay=document.getElementById("overlay"),mTitle=document.getElementById("mTitle"),mBody=document.getElementById("mBody");
  var brand=S.brandName||"this site",mail=(S.footer&&S.footer.contactEmail)||"hello@yourdomain.com";
  function trustHTML(){var t=S.trust||[];return t.map(function(x){return '<div class="trustrow"><div class="e">'+esc(x.emoji||"•")+'</div><div><h4>'+esc(x.title)+'</h4><p>'+esc(x.text)+'</p></div></div>';}).join("");}
  function faqHTML(){return (S.faq||[]).map(function(x){return '<details><summary>'+esc(x.q)+'</summary><div class="a">'+esc(x.a)+'</div></details>';}).join("");}
  function legalHTML(){
    var disc=(S.affiliateDisclosure||"Some links are affiliate links.")+" We are not the seller — all purchases, payments, shipping and returns are handled by the store you are sent to.";
    var priv="This site, "+brand+", is operated by [Your name / company], [address], [country]. We collect only the data needed to run the site. If you submit your email, we use it only to send product updates and you can unsubscribe anytime. We may use analytics/advertising cookies (e.g. Google, TikTok, Meta) only with your consent. To request access to or deletion of your data, email "+mail+". Template — adapt to your data use and GDPR obligations.";
    var cook="We use essential cookies to make the site work. With your consent we may use analytics and advertising cookies. You can withdraw consent anytime. Add a consent banner before enabling any non-essential cookies in the EU. Template — review before launch.";
    var terms="Information on "+brand+" is for general guidance. Prices, availability and product details are set by third-party stores and may change. We make no guarantees about products sold by third parties. By using this site you accept these terms. Template — review before launch.";
    return '<details open><summary>Affiliate disclosure</summary><div class="a">'+esc(disc)+'</div></details>'+
      '<details><summary>Privacy policy (template)</summary><div class="a">'+esc(priv)+'</div></details>'+
      '<details><summary>Cookie policy (template)</summary><div class="a">'+esc(cook)+'</div></details>'+
      '<details><summary>Terms (template)</summary><div class="a">'+esc(terms)+'</div></details>'+
      '<p class="note">Starting templates, not legal advice. Review before launch.</p>';
  }
  function contactHTML(){var c=(S.contacts||[]).map(function(x){return '<p><b>'+esc(x.label)+':</b> <a href="'+esc(x.href||"#")+'" style="color:var(--accent)">'+esc(x.value||"")+'</a></p>';}).join("");
    return c+'<p class="note">'+esc((S.footer&&S.footer.disclaimer)||"")+'</p>';}
  var MODALS={how:{t:"How we choose",h:trustHTML},faq:{t:"Questions, answered",h:faqHTML},legal:{t:"Legal & privacy",h:legalHTML},contact:{t:"Contact",h:contactHTML}};
  function openModal(k){var m=MODALS[k];if(!m)return;mTitle.textContent=m.t;mBody.innerHTML=m.h();overlay.classList.add("open");overlay.setAttribute("aria-hidden","false");document.getElementById("mClose").focus();}
  function closeModal(){overlay.classList.remove("open");overlay.setAttribute("aria-hidden","true");}
  document.querySelector(".foot").addEventListener("click",function(e){var b=e.target.closest("[data-modal]");if(b)openModal(b.dataset.modal);});
  document.getElementById("mClose").addEventListener("click",closeModal);
  overlay.addEventListener("click",function(e){if(e.target===overlay)closeModal();});

  /* ---------- keyboard ---------- */
  document.addEventListener("keydown",function(e){
    if(overlay.classList.contains("open")){if(e.key==="Escape")closeModal();return;}
    if(drawer.classList.contains("open")){if(e.key==="Escape")closeDrawer();return;}
    if(e.key==="ArrowLeft")step(-1);if(e.key==="ArrowRight")step(1);});

  /* ---------- init (+ ad deep-link ?p=id / #id) ---------- */
  var dl=(new URLSearchParams(location.search).get("p"))||(location.hash?location.hash.slice(1):"");
  if(dl){var m=ALL.filter(function(p){return p.id===dl;})[0]; if(m)cur=m;}
  renderCats(); renderProds(); renderStage();
  var li=prodsIn(cur.category); var ki=li.indexOf(cur); preload(li[ki+1]); preload(li[ki-1]);
  window.addEventListener("hashchange",function(){var h=location.hash.slice(1),m=ALL.filter(function(p){return p.id===h;})[0];if(m)go(m);});
})();
</script>
</body>
</html>
