<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>the everyday edit</title>
<meta name="description" content="Useful viral finds, only the ones worth it." />
<meta name="theme-color" content="#0E9C92" />
<meta name="color-scheme" content="light" />

<!-- Open Graph / social preview (edit when you have a real domain + image) -->
<meta property="og:type" content="website" />
<meta property="og:title" content="the everyday edit" />
<meta property="og:description" content="Useful viral finds, only the ones worth it." />
<meta property="og:image" content="images/og-cover.jpg" />

<!-- ============================================================
     TRACKING PIXELS GO HERE (TikTok Pixel / Meta Pixel / GA4).
     IMPORTANT (EU): non-essential tracking pixels legally require
     user CONSENT in the EU. Add a consent banner before enabling.
     See README → "Tracking & EU consent". Leave commented until then.
     ============================================================ -->

<style>
  :root{
    --bg:#ffffff; --bg-soft:#faf7f2; --ink:#18140f; --ink-soft:#5c5346;
    --line:#ece6dc; --brand:#0e9c92; --brand-ink:#0b7a72;
    --sun:#ff6a3d; --sun-ink:#e2502a;
    --radius:18px; --radius-sm:12px; --shadow:0 6px 24px rgba(20,16,10,.08);
    --maxw:1120px; --header-h:58px;
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Inter, Helvetica, Arial, sans-serif;
  }
  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{
    margin:0; font-family:var(--font); color:var(--ink); background:var(--bg);
    line-height:1.5; -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  }
  img{max-width:100%; display:block}
  a{color:inherit; text-decoration:none}
  h1,h2,h3{line-height:1.15; margin:0; letter-spacing:-.02em}
  .wrap{max-width:var(--maxw); margin:0 auto; padding:0 18px}
  section{scroll-margin-top:calc(var(--header-h) + 16px)}

  /* ---------- buttons ---------- */
  .btn{
    display:inline-flex; align-items:center; justify-content:center; gap:.4em;
    background:var(--sun); color:#fff; font-weight:700; font-size:16px;
    padding:14px 22px; border-radius:999px; border:0; cursor:pointer;
    min-height:48px; transition:transform .12s ease, background .12s ease, box-shadow .12s ease;
    box-shadow:0 4px 14px rgba(255,106,61,.32);
  }
  .btn:hover{background:var(--sun-ink); transform:translateY(-1px)}
  .btn:active{transform:translateY(0)}
  .btn-ghost{
    display:inline-flex; align-items:center; justify-content:center; gap:.4em;
    background:transparent; color:var(--ink); font-weight:600; font-size:15px;
    padding:13px 20px; border-radius:999px; border:1.5px solid var(--line); cursor:pointer;
    min-height:48px; transition:border-color .12s ease, background .12s ease;
  }
  .btn-ghost:hover{border-color:var(--ink); background:var(--bg-soft)}
  .btn-block{width:100%}

  /* ---------- offer bar (marquee) ---------- */
  .offer-bar{background:var(--ink); color:#fff; overflow:hidden; white-space:nowrap; font-size:13px}
  .offer-track{display:inline-flex; gap:0; padding:9px 0; animation:marq 26s linear infinite; will-change:transform}
  .offer-track:hover{animation-play-state:paused}
  .offer-track span{padding:0 26px; opacity:.92}
  .offer-track span::after{content:"•"; position:relative; left:13px; opacity:.4}
  @keyframes marq{from{transform:translateX(0)} to{transform:translateX(-50%)}}

  /* ---------- header ---------- */
  header.site{
    position:sticky; top:0; z-index:50; background:rgba(255,255,255,.86);
    backdrop-filter:saturate(160%) blur(10px); border-bottom:1px solid var(--line);
  }
  .head-row{display:flex; align-items:center; gap:14px; height:var(--header-h)}
  .brand{font-weight:800; font-size:18px; letter-spacing:-.03em; color:var(--ink); white-space:nowrap}
  .brand b{color:var(--brand)}
  nav.links{margin-left:auto; display:flex; gap:4px; overflow-x:auto; -webkit-overflow-scrolling:touch; scrollbar-width:none}
  nav.links::-webkit-scrollbar{display:none}
  nav.links a{font-size:14px; color:var(--ink-soft); padding:8px 10px; border-radius:999px; white-space:nowrap; font-weight:600}
  nav.links a:hover{color:var(--ink); background:var(--bg-soft)}

  /* ---------- hero ---------- */
  .hero{background:
      radial-gradient(120% 120% at 85% -10%, rgba(14,156,146,.16), transparent 55%),
      radial-gradient(120% 120% at 0% 0%, rgba(255,106,61,.12), transparent 50%),
      var(--bg-soft);
    border-bottom:1px solid var(--line)}
  .hero-in{padding:46px 0 40px; max-width:760px}
  .eyebrow{display:inline-block; font-size:12px; font-weight:800; letter-spacing:.12em;
    color:var(--brand-ink); background:#fff; border:1px solid var(--line);
    padding:7px 12px; border-radius:999px; margin-bottom:16px}
  .hero h1{font-size:clamp(30px,7.5vw,52px); font-weight:850}
  .hero p{font-size:clamp(16px,4.2vw,19px); color:var(--ink-soft); margin:16px 0 26px; max-width:560px}
  .hero-cta{display:flex; flex-wrap:wrap; gap:12px}

  /* ---------- category chips ---------- */
  .chips-sec{padding:22px 0 6px}
  .chips{display:flex; gap:10px; overflow-x:auto; padding-bottom:6px; scrollbar-width:none}
  .chips::-webkit-scrollbar{display:none}
  .chip{flex:0 0 auto; border:1.5px solid var(--line); background:#fff; color:var(--ink);
    padding:11px 16px; border-radius:999px; font-weight:700; font-size:15px; cursor:pointer; transition:.12s}
  .chip:hover{border-color:var(--brand); color:var(--brand-ink)}
  .chip.active{background:var(--ink); color:#fff; border-color:var(--ink)}

  /* ---------- featured ---------- */
  .featured{margin:18px 0 8px; background:var(--ink); color:#fff; border-radius:24px; overflow:hidden}
  .featured-in{display:grid; grid-template-columns:1fr; gap:0}
  .featured .media{aspect-ratio:16/10; display:flex; align-items:center; justify-content:center; font-size:74px}
  .featured .body{padding:22px}
  .featured .kicker{font-size:12px; font-weight:800; letter-spacing:.1em; color:#ffd9cb}
  .featured h3{font-size:26px; margin:8px 0 6px}
  .featured p{color:#e9e3d8; margin:0 0 8px; font-size:15px}
  .featured .price{font-weight:800; margin:6px 0 16px; font-size:15px; color:#fff}
  @media(min-width:760px){
    .featured-in{grid-template-columns:1.05fr 1fr; align-items:stretch}
    .featured .media{aspect-ratio:auto; min-height:280px; font-size:96px}
  }

  /* ---------- sections + grid ---------- */
  .cat{padding:30px 0 8px}
  .cat-head{margin-bottom:16px}
  .cat-head h2{font-size:clamp(22px,5.5vw,30px); font-weight:850}
  .cat-head p{color:var(--ink-soft); margin:7px 0 0; max-width:620px; font-size:15px}
  .grid{display:grid; grid-template-columns:1fr; gap:16px}
  @media(min-width:560px){.grid{grid-template-columns:1fr 1fr}}
  @media(min-width:920px){.grid{grid-template-columns:1fr 1fr 1fr}}

  .card{background:#fff; border:1px solid var(--line); border-radius:var(--radius);
    overflow:hidden; display:flex; flex-direction:column; box-shadow:var(--shadow);
    transition:transform .14s ease, box-shadow .14s ease}
  .card:hover{transform:translateY(-3px); box-shadow:0 14px 34px rgba(20,16,10,.12)}
  .card .media{aspect-ratio:4/3; position:relative; display:flex; align-items:center; justify-content:center;
    font-size:58px; background:linear-gradient(135deg, #fff, var(--bg-soft))}
  .card .media img{width:100%; height:100%; object-fit:cover}
  .badge{position:absolute; top:12px; left:12px; background:#fff; color:var(--ink);
    font-size:12px; font-weight:800; padding:6px 11px; border-radius:999px; box-shadow:var(--shadow)}
  .tag-test{position:absolute; top:12px; right:12px; background:var(--brand); color:#fff;
    font-size:11px; font-weight:800; padding:5px 9px; border-radius:999px; letter-spacing:.04em}
  .card .body{padding:16px 16px 18px; display:flex; flex-direction:column; flex:1}
  .bestfor{font-size:12px; font-weight:800; color:var(--brand-ink); text-transform:uppercase; letter-spacing:.05em}
  .card h3{font-size:19px; margin:7px 0 6px; font-weight:800}
  .hook{font-size:15px; color:var(--ink); margin:0 0 10px}
  .pb{font-size:13.5px; color:var(--ink-soft); margin:0 0 4px}
  .pb b{color:var(--ink)}
  .card .price{font-weight:800; margin:12px 0 12px; font-size:15px}
  .card .price small{font-weight:600; color:var(--ink-soft)}
  .card .cta{margin-top:auto}
  .card.flash{box-shadow:0 0 0 3px var(--sun), 0 14px 34px rgba(255,106,61,.25)}

  /* ---------- comparison ---------- */
  .compare{margin-top:18px; border:1px solid var(--line); border-radius:var(--radius); overflow:hidden; background:#fff}
  .compare h3{font-size:18px; padding:16px 16px 0}
  .compare .scroll{overflow-x:auto}
  table{border-collapse:collapse; width:100%; min-width:520px; font-size:14px}
  th,td{text-align:left; padding:12px 14px; border-top:1px solid var(--line); vertical-align:top}
  thead th{background:var(--bg-soft); font-weight:800}
  tbody th{font-weight:700; color:var(--ink-soft); white-space:nowrap}

  /* ---------- trust ---------- */
  .band{background:var(--bg-soft); border-top:1px solid var(--line); border-bottom:1px solid var(--line); margin-top:34px}
  .trust{padding:36px 0; display:grid; grid-template-columns:1fr; gap:18px}
  @media(min-width:680px){.trust{grid-template-columns:1fr 1fr}}
  @media(min-width:980px){.trust{grid-template-columns:repeat(4,1fr)}}
  .trust .h{font-size:22px; font-weight:850; grid-column:1/-1; margin-bottom:2px}
  .tcard .e{font-size:30px}
  .tcard h4{margin:8px 0 4px; font-size:16px}
  .tcard p{margin:0; font-size:14px; color:var(--ink-soft)}

  /* ---------- email ---------- */
  .email{padding:38px 0}
  .email-box{background:var(--ink); color:#fff; border-radius:24px; padding:28px 22px; text-align:center}
  .email-box h3{font-size:24px; margin-bottom:8px}
  .email-box p{color:#e9e3d8; margin:0 auto 18px; max-width:440px; font-size:15px}
  .email-form{display:flex; flex-wrap:wrap; gap:10px; justify-content:center; max-width:460px; margin:0 auto}
  .email-form input{flex:1 1 200px; min-height:48px; border:0; border-radius:999px; padding:0 18px; font-size:16px; color:var(--ink)}
  .email-note{margin-top:12px; font-size:13px; color:#bdb6a8}

  /* ---------- faq ---------- */
  .faq{padding:30px 0}
  .faq h2{font-size:clamp(22px,5.5vw,30px); font-weight:850; margin-bottom:14px}
  details{border:1px solid var(--line); border-radius:var(--radius-sm); padding:0; margin-bottom:10px; background:#fff; overflow:hidden}
  summary{list-style:none; cursor:pointer; padding:16px 18px; font-weight:700; font-size:16px; display:flex; justify-content:space-between; gap:12px; align-items:center}
  summary::-webkit-details-marker{display:none}
  summary::after{content:"+"; color:var(--brand); font-weight:800; font-size:22px; line-height:1}
  details[open] summary::after{content:"–"}
  details .a{padding:0 18px 16px; color:var(--ink-soft); font-size:15px}

  /* ---------- disclosure + legal ---------- */
  .disclosure{background:var(--bg-soft); border:1px solid var(--line); border-radius:var(--radius-sm);
    padding:16px 18px; font-size:14px; color:var(--ink-soft); margin:8px 0 0}
  .legal{padding:26px 0}
  .legal h2{font-size:20px; margin-bottom:6px}
  .legal .note{font-size:13px; color:var(--ink-soft); margin-bottom:14px}
  .legal details .a{font-size:14px; line-height:1.6}

  /* ---------- footer ---------- */
  footer.site{background:var(--ink); color:#cfc8ba; padding:40px 0 30px; margin-top:20px}
  .foot-grid{display:grid; grid-template-columns:1fr 1fr; gap:26px}
  @media(min-width:760px){.foot-grid{grid-template-columns:2fr 1fr 1fr 1fr}}
  .foot-brand .brand{color:#fff; font-size:20px}
  .foot-brand p{font-size:13.5px; margin:10px 0 0; max-width:300px}
  .foot-col h5{color:#fff; font-size:13px; text-transform:uppercase; letter-spacing:.08em; margin:0 0 12px}
  .foot-col a{display:block; font-size:14px; padding:5px 0; color:#cfc8ba}
  .foot-col a:hover{color:#fff}
  .foot-bottom{border-top:1px solid rgba(255,255,255,.12); margin-top:28px; padding-top:18px; font-size:12.5px; color:#9b9384}

  @media (prefers-reduced-motion: reduce){
    html{scroll-behavior:auto}
    .offer-track{animation:none; white-space:normal}
    .reveal{opacity:1 !important; transform:none !important}
  }
  .reveal{opacity:0; transform:translateY(14px); transition:opacity .5s ease, transform .5s ease}
  .reveal.in{opacity:1; transform:none}
</style>
</head>
<body>

  <!-- offer bar -->
  <div class="offer-bar"><div class="offer-track" id="offerTrack"></div></div>

  <!-- header -->
  <header class="site">
    <div class="wrap head-row">
      <a class="brand" href="#top" id="brand">the everyday<b>edit</b></a>
      <nav class="links" id="nav"></nav>
    </div>
  </header>

  <a id="top"></a>

  <!-- hero -->
  <section class="hero">
    <div class="wrap hero-in">
      <span class="eyebrow" id="heroEyebrow"></span>
      <h1 id="heroTitle"></h1>
      <p id="heroSub"></p>
      <div class="hero-cta" id="heroCta"></div>
    </div>
  </section>

  <!-- category chips -->
  <section class="chips-sec"><div class="wrap"><div class="chips" id="chips"></div></div></section>

  <!-- featured -->
  <div class="wrap"><div id="featured"></div></div>

  <!-- product sections (rendered per category) -->
  <main id="sections" class="wrap"></main>

  <!-- trust / how we choose -->
  <div class="band"><div class="wrap"><div class="trust" id="trust"></div></div></div>

  <!-- email capture -->
  <section class="email"><div class="wrap"><div id="emailBox"></div></div></section>

  <!-- faq -->
  <section class="faq" id="faq"><div class="wrap"><h2>Questions, answered</h2><div id="faqList"></div>
    <div class="disclosure" id="disclosure"></div>
  </div></section>

  <!-- legal templates -->
  <section class="legal" id="legal"><div class="wrap">
    <h2>Legal &amp; privacy</h2>
    <p class="note">Starting templates — not legal advice. Review and adapt before you launch, and add your real business name, address and email.</p>
    <div id="legalBlocks"></div>
  </div></section>

  <!-- footer -->
  <footer class="site"><div class="wrap">
    <div class="foot-grid" id="footGrid"></div>
    <div class="foot-bottom" id="footBottom"></div>
  </div></footer>

<script src="products.js"></script>
<script>
(function(){
  var S = window.SITE, P = window.PRODUCTS;
  if(!S || !P){ document.body.insertAdjacentHTML("afterbegin",
    "<p style='padding:20px;color:#b00'>products.js failed to load. Keep it in the same folder as index.html.</p>"); return; }

  var esc = function(s){ return String(s==null?"":s)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); };
  var byId = function(id){ return document.getElementById(id); };

  /* meta */
  document.title = S.metaTitle || S.brandName;
  var md = document.querySelector('meta[name="description"]'); if(md && S.metaDescription) md.content = S.metaDescription;

  /* offer bar (duplicated for seamless loop) */
  var oneSet = S.offerBar.map(function(t){ return "<span>"+esc(t)+"</span>"; }).join("");
  byId("offerTrack").innerHTML = oneSet + oneSet;

  /* brand + nav */
  if(S.brandName){
    var parts = S.brandName.split(" ");
    var last = parts.pop();
    byId("brand").innerHTML = esc(parts.join(" ")) + (parts.length?" ":"") + "<b>"+esc(last)+"</b>";
  }
  byId("nav").innerHTML = S.nav.map(function(n){
    return '<a href="'+esc(n.href)+'">'+esc(n.label)+'</a>'; }).join("");

  /* hero */
  byId("heroEyebrow").textContent = S.hero.eyebrow || "";
  byId("heroTitle").textContent   = S.hero.headline || "";
  byId("heroSub").textContent     = S.hero.sub || "";
  byId("heroCta").innerHTML =
    '<a class="btn" href="'+esc(S.hero.ctaPrimaryHref)+'">'+esc(S.hero.ctaPrimary)+'</a>' +
    '<a class="btn-ghost" href="'+esc(S.hero.ctaSecondaryHref)+'">'+esc(S.hero.ctaSecondary)+'</a>';

  /* chips */
  byId("chips").innerHTML = '<button class="chip active" data-target="top">All</button>' +
    S.categories.map(function(c){
      return '<button class="chip" data-target="'+esc(c.id)+'">'+esc(c.chip)+'</button>'; }).join("");

  /* helper: visible products (not paused), sorted by priority desc */
  var visible = P.filter(function(p){ return p.status !== "paused"; })
                 .sort(function(a,b){ return (b.priority||0)-(a.priority||0); });

  /* media tile (image if set, else gradient + emoji) */
  function media(p, cls){
    if(p.image){ return '<img loading="lazy" src="'+esc(p.image)+'" alt="'+esc(p.productName)+'">'; }
    return '<span aria-hidden="true">'+esc(p.emoji||"🛍️")+'</span>';
  }

  /* featured: ?featured=ID overrides, else top priority */
  var qp = new URLSearchParams(location.search);
  var fId = qp.get("featured");
  var feat = visible.filter(function(p){ return p.id===fId; })[0] || visible[0];
  if(feat){
    byId("featured").innerHTML =
      '<div class="featured reveal"><div class="featured-in">' +
        '<div class="media">'+media(feat)+'</div>' +
        '<div class="body">' +
          '<div class="kicker">FEATURED PICK</div>' +
          '<h3>'+esc(feat.productName)+'</h3>' +
          '<p>'+esc(feat.shortHook)+'</p>' +
          '<p style="color:#cfc8ba;font-size:14px">'+esc(feat.mainBenefit)+'</p>' +
          '<div class="price">'+esc(feat.price)+' <small style="color:#bdb6a8">· price set by store</small></div>' +
          '<a class="btn" href="'+esc(feat.link)+'" target="_blank" rel="sponsored noopener" data-pid="'+esc(feat.id)+'">'+esc(feat.cta)+'</a>' +
        '</div>' +
      '</div></div>';
  }

  /* product card */
  function card(p){
    var test = p.status==="testing" ? '<span class="tag-test">testing</span>' : '';
    return '<article class="card reveal" id="'+esc(p.id)+'">' +
        '<div class="media">'+media(p)+
          '<span class="badge">'+esc(p.badge)+'</span>'+test+
        '</div>' +
        '<div class="body">' +
          '<div class="bestfor">Best for · '+esc(p.bestFor)+'</div>' +
          '<h3>'+esc(p.productName)+'</h3>' +
          '<p class="hook">'+esc(p.shortHook)+'</p>' +
          '<p class="pb"><b>The problem:</b> '+esc(p.painPoint)+'</p>' +
          '<p class="pb"><b>Why this:</b> '+esc(p.mainBenefit)+'</p>' +
          '<div class="price">'+esc(p.price)+' <small>· check live price</small></div>' +
          '<a class="btn btn-block cta" href="'+esc(p.link)+'" target="_blank" rel="sponsored noopener" data-pid="'+esc(p.id)+'">'+esc(p.cta)+'</a>' +
        '</div>' +
      '</article>';
  }

  /* sections per category */
  var html = "";
  S.categories.forEach(function(c){
    var items = visible.filter(function(p){ return p.category===c.id; });
    if(!items.length) return;
    html += '<section class="cat" id="'+esc(c.id)+'">' +
        '<div class="cat-head"><h2>'+esc(c.label)+'</h2><p>'+esc(c.blurb)+'</p></div>' +
        '<div class="grid">'+items.map(card).join("")+'</div>';
    /* comparison table for the summer-cooling section */
    if(c.id==="summer-cooling" && items.length>=2){
      html += '<div class="compare reveal"><h3>Which cooling pick is right for you?</h3><div class="scroll"><table>' +
        '<thead><tr><th>&nbsp;</th>'+items.map(function(p){return '<th>'+esc(p.productName)+'</th>';}).join("")+'</tr></thead>' +
        '<tbody>' +
          '<tr><th>Best for</th>'+items.map(function(p){return '<td>'+esc(p.bestFor)+'</td>';}).join("")+'</tr>' +
          '<tr><th>From</th>'+items.map(function(p){return '<td>'+esc(p.price)+'</td>';}).join("")+'</tr>' +
          '<tr><th>In short</th>'+items.map(function(p){return '<td>'+esc(p.shortHook)+'</td>';}).join("")+'</tr>' +
        '</tbody></table></div></div>';
    }
    html += '</section>';
  });
  byId("sections").innerHTML = html;

  /* trust */
  byId("trust").innerHTML = '<div class="h" id="how">How we choose</div>' +
    S.trust.map(function(t){
      return '<div class="tcard reveal"><div class="e">'+esc(t.emoji)+'</div><h4>'+esc(t.title)+'</h4><p>'+esc(t.text)+'</p></div>';
    }).join("");

  /* email */
  if(S.email && S.email.enabled){
    byId("emailBox").innerHTML =
      '<div class="email-box reveal"><h3>'+esc(S.email.title)+'</h3><p>'+esc(S.email.text)+'</p>' +
      '<form class="email-form" id="emailForm"'+(S.email.action?(' action="'+esc(S.email.action)+'" method="POST"'):'')+'>' +
        '<input type="email" name="email" required placeholder="'+esc(S.email.placeholder)+'">' +
        '<button class="btn" type="submit">'+esc(S.email.button)+'</button>' +
      '</form><div class="email-note" id="emailNote"></div></div>';
    var ef = byId("emailForm");
    if(!S.email.action){
      ef.addEventListener("submit", function(e){ e.preventDefault();
        ef.style.display="none"; byId("emailNote").textContent="Thanks — you're on the list. (Connect a form tool to store emails — see README.)"; });
    }
  }

  /* faq + disclosure */
  byId("faqList").innerHTML = S.faq.map(function(f){
    return '<details><summary>'+esc(f.q)+'</summary><div class="a">'+esc(f.a)+'</div></details>'; }).join("");
  byId("disclosure").textContent = S.affiliateDisclosure;

  /* legal templates */
  var brand = S.brandName, mail = (S.footer&&S.footer.contactEmail)||"hello@yourdomain.com";
  var legal = [
    { t:"Affiliate disclosure", b: S.affiliateDisclosure +
      " We are not the seller. All purchases, payments, shipping and returns are handled by the store you are sent to." },
    { t:"Privacy policy (template)", b:
      "This site, "+brand+", is operated by [Your name / company], [address], [country]. We collect only the data needed to run this site. "+
      "If you submit your email, we use it only to send you product updates and you can unsubscribe anytime. "+
      "We may use analytics and advertising cookies (e.g. TikTok, Meta) only with your consent. "+
      "You can request access to or deletion of your data by emailing "+mail+". This is a template — adapt it to your actual data use and GDPR obligations." },
    { t:"Cookie policy (template)", b:
      "We use essential cookies to make the site work. With your consent we may use analytics and advertising cookies to measure ads and traffic. "+
      "You can withdraw consent at any time. Add a consent banner before enabling any non-essential cookies in the EU. Template — review before launch." },
    { t:"Terms (template)", b:
      "The information on "+brand+" is provided for general guidance. Prices, availability and product details are set by third-party stores and may change. "+
      "We make no guarantees about products sold by third parties. By using this site you accept these terms. Template — review before launch." },
    { t:"Contact", b: "Questions? Email "+mail+"." },
  ];
  byId("legalBlocks").innerHTML = legal.map(function(l){
    return '<details><summary>'+esc(l.t)+'</summary><div class="a">'+esc(l.b)+'</div></details>'; }).join("");

  /* footer */
  byId("footGrid").innerHTML =
    '<div class="foot-col foot-brand"><div class="brand">'+esc(S.brandName)+'</div><p>'+esc(S.metaDescription||"")+'</p></div>' +
    S.footer.columns.map(function(col){
      return '<div class="foot-col"><h5>'+esc(col.title)+'</h5>'+
        col.links.map(function(l){ return '<a href="'+esc(l.href)+'">'+esc(l.label)+'</a>'; }).join("")+'</div>';
    }).join("");
  byId("footBottom").innerHTML = "© "+new Date().getFullYear()+" "+esc(S.brandName)+". "+esc(S.footer.disclaimer);

  /* ---- behaviours ---- */

  /* chips: smooth scroll + active state */
  var chips = Array.prototype.slice.call(document.querySelectorAll(".chip"));
  chips.forEach(function(ch){
    ch.addEventListener("click", function(){
      var t = ch.getAttribute("data-target");
      var el = document.getElementById(t);
      if(el) el.scrollIntoView({behavior:"smooth", block:"start"});
    });
  });

  /* scrollspy: highlight chip for the section in view */
  var spy = new IntersectionObserver(function(entries){
    entries.forEach(function(en){
      if(en.isIntersecting){
        var id = en.target.id;
        chips.forEach(function(c){ c.classList.toggle("active", c.getAttribute("data-target")===id); });
      }
    });
  }, {rootMargin:"-45% 0px -50% 0px"});
  S.categories.forEach(function(c){ var el=document.getElementById(c.id); if(el) spy.observe(el); });

  /* reveal on scroll */
  var rev = new IntersectionObserver(function(entries){
    entries.forEach(function(en){ if(en.isIntersecting){ en.target.classList.add("in"); rev.unobserve(en.target); } });
  }, {rootMargin:"0px 0px -8% 0px"});
  document.querySelectorAll(".reveal").forEach(function(el){ rev.observe(el); });

  /* ad deep-link highlight: #product-id or ?p=product-id flashes that card */
  function flash(id){
    var el = document.getElementById(id);
    if(el && el.classList.contains("card")){
      setTimeout(function(){ el.scrollIntoView({behavior:"smooth", block:"center"});
        el.classList.add("flash"); setTimeout(function(){ el.classList.remove("flash"); }, 2600); }, 120);
    }
  }
  var pParam = qp.get("p"); if(pParam) flash(pParam);
  if(location.hash) flash(location.hash.slice(1));
  window.addEventListener("hashchange", function(){ flash(location.hash.slice(1)); });

  /* OPTIONAL: outbound click tracking hook.
     Every CTA has data-pid. Fire your pixel/analytics here if you want. */
  document.addEventListener("click", function(e){
    var a = e.target.closest && e.target.closest("a[data-pid]");
    if(!a) return;
    var pid = a.getAttribute("data-pid");
    // Example: if (window.ttq) ttq.track('ClickButton', {content_id: pid});
    // Example: if (window.fbq) fbq('trackCustom','OutboundClick',{product:pid});
  });
})();
</script>
</body>
</html>
